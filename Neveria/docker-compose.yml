version: '3.8'

services:
  # Interfaz para los clientes (Red Pública)
  frontend-nube-fria:
    build: ./frontend
    ports:
      - "8086:80"
    networks:
      - red-publica
    restart: always

  # El cerebro del sistema (En ambas redes)
  backend-nube-fria:
    build: ./backend
    ports:
      - "3004:3004"
    networks:
      - red-publica
      - red-privada
    depends_on:
      - db-neveria
    restart: always

  # La caja fuerte de datos (Solo Red Privada)
  db-neveria:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "123456" # Cámbialo por uno real
      MYSQL_DATABASE: "neveriadb"
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - red-privada
    restart: always

networks:
  red-publica:
    driver: bridge
  red-privada:
    driver: bridge